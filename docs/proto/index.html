<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auris Vive — Prototype</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jost:wght@200;300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #06060A; }
    canvas { display: block; position: fixed; top: 0; left: 0; }
    #controls {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 10;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
    }
    #play-btn {
      background: rgba(123, 94, 167, 0.25);
      border: 1px solid rgba(123, 94, 167, 0.5);
      color: #E8E0D5;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      padding: 8px 24px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: background 0.2s;
    }
    #play-btn:hover { background: rgba(123, 94, 167, 0.4); }
    #play-btn:disabled { opacity: 0.4; cursor: default; }
    #song-select {
      background: rgba(14, 11, 24, 0.8);
      border: 1px solid rgba(123, 94, 167, 0.3);
      color: #E8E0D5;
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      font-size: 14px;
      padding: 8px 12px;
      border-radius: 4px;
      cursor: pointer;
    }
    #status {
      color: rgba(232, 224, 213, 0.45);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="controls">
    <button id="play-btn" disabled>Click to play</button>
    <select id="song-select"></select>
    <span id="status">Loading…</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
